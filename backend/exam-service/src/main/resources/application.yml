spring:
  application:
    name: exam-service
  
  cache:
    type: redis
    redis:
      time-to-live: 7200000
  
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  
  datasource:
    url: jdbc:postgresql://localhost:5432/englishflow_exams
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
  
  cloud:
    config:
      enabled: false

server:
  port: 8087

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
    # Intervalle de récupération du registre (par défaut 30s, réduit à 5s)
    registry-fetch-interval-seconds: 5
    # Activer le healthcheck
    healthcheck:
      enabled: true
    # Désactiver le cache local pour un rafraîchissement immédiat
    disable-delta: false
  instance:
    prefer-ip-address: true
    # Intervalle de heartbeat (par défaut 30s, réduit à 5s)
    lease-renewal-interval-in-seconds: 5
    # Durée avant expiration (par défaut 90s, réduit à 10s)
    lease-expiration-duration-in-seconds: 10
    # Métadonnées pour identifier l'instance
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
    # Statut initial
    initial-status: STARTING
    # Activer le healthcheck endpoint
    health-check-url-path: /actuator/health

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.englishflow.exam: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
